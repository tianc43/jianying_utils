services:
  jianying-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jianying-api
    ports:
      - "8000:8000"
    environment:
      - JIANYING_DRAFTS_DIR=/app/drafts
      - JIANYING_DOWNLOAD_DIR=/app/downloads
      - JIANYING_TTS_DIR=/app/tts_output    # TTS 音频输出目录
      - FISH_API_KEY=${FISH_API_KEY:-}       # Fish Audio TTS API Key
      - ROOT_PATH=/jianying-utils            # nginx 代理路径前缀
      - DEPLOY_URL=https://tianc43.xyz/jianying-utils
      - WORKERS=4                            # gunicorn worker 数量
      - JIANYING_LOG_LEVEL=INFO              # 日志级别: DEBUG/INFO/WARNING/ERROR
    volumes:
      - ./data/drafts:/app/drafts            # 草稿文件 → 主机 ./data/drafts
      - ./data/uploads:/app/uploads          # 上传素材 → 主机 ./data/uploads
      - ./data/downloads:/app/downloads      # 远程素材缓存 → 主机 ./data/downloads
      - ./data/tts:/app/tts_output           # TTS 音频 → 主机 ./data/tts
      - ./assets:/app/assets                 # 素材文件 → 主机 ./assets
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# 无需声明顶层 volumes（bind mount 直接使用主机路径）
