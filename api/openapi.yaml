components:
  schemas:
    AnimationAdd:
      properties:
        segment_id:
          type: string
          title: Segment Id
          description: 片段 ID
        animation_name:
          type: string
          title: Animation Name
          description: 动画名称
        duration:
          anyOf:
          - type: string
          - type: integer
          title: Duration
          description: 动画持续时间
          nullable: true
      type: object
      required:
      - segment_id
      - animation_name
      title: AnimationAdd
    AudioAdd:
      properties:
        audio_path:
          type: string
          title: Audio Path
          description: 音频文件路径
        start:
          anyOf:
          - type: string
          - type: integer
          title: Start
          description: 起始时间
        duration:
          anyOf:
          - type: string
          - type: integer
          title: Duration
          description: 持续时间
          nullable: true
        speed:
          type: number
          title: Speed
          description: 播放速度
          default: 1.0
        volume:
          type: number
          title: Volume
          description: 音量
          default: 1.0
        track_name:
          title: Track Name
          description: 目标轨道名称
          nullable: true
          type: string
      type: object
      required:
      - audio_path
      - start
      title: AudioAdd
    AudioBatch:
      properties:
        audio_infos:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Audio Infos
          description: 音频信息列表
        track_name:
          title: Track Name
          description: 目标轨道名称
          nullable: true
          type: string
      type: object
      required:
      - audio_infos
      title: AudioBatch
    AudioFade:
      properties:
        segment_id:
          type: string
          title: Segment Id
          description: 片段 ID
        in_duration:
          anyOf:
          - type: string
          - type: integer
          title: In Duration
          description: 淡入时长
        out_duration:
          anyOf:
          - type: string
          - type: integer
          title: Out Duration
          description: 淡出时长
      type: object
      required:
      - segment_id
      - in_duration
      - out_duration
      title: AudioFade
    BatchResponse:
      properties:
        success:
          type: boolean
          title: Success
          description: 操作是否成功
          default: true
        message:
          type: string
          title: Message
          description: 操作结果消息
          default: ''
        count:
          type: integer
          title: Count
          description: 添加的片段数量
          default: 0
        segment_ids:
          items:
            type: string
          type: array
          title: Segment Ids
          description: 新创建片段的 ID 列表
      type: object
      title: BatchResponse
    CaptionItem:
      properties:
        text:
          type: string
          title: Text
          description: 字幕文本
        start:
          type: integer
          title: Start
          description: 起始时间（微秒）
        end:
          type: integer
          title: End
          description: 结束时间（微秒）
      type: object
      required:
      - text
      - start
      - end
      title: CaptionItem
    CaptionsAdd:
      properties:
        captions:
          items:
            $ref: '#/components/schemas/CaptionItem'
          type: array
          title: Captions
          description: 字幕列表
        font:
          title: Font
          description: 字体名称
          nullable: true
          type: string
        font_size:
          type: number
          title: Font Size
          description: 字体大小
          default: 5.0
        text_color:
          type: string
          title: Text Color
          description: 文字颜色
          default: '#FFFFFF'
        alpha:
          type: number
          title: Alpha
          description: 不透明度
          default: 1.0
        bold:
          type: boolean
          title: Bold
          description: 加粗
          default: false
        italic:
          type: boolean
          title: Italic
          description: 斜体
          default: false
        underline:
          type: boolean
          title: Underline
          description: 下划线
          default: false
        alignment:
          type: integer
          title: Alignment
          description: '对齐方式: 0=左 1=中 2=右'
          default: 1
        letter_spacing:
          type: integer
          title: Letter Spacing
          description: 字符间距
          default: 0
        line_spacing:
          type: integer
          title: Line Spacing
          description: 行间距
          default: 0
        line_max_width:
          type: number
          title: Line Max Width
          description: 最大行宽比例
          default: 0.82
        auto_wrapping:
          type: boolean
          title: Auto Wrapping
          description: 自动换行
          default: true
        border:
          title: Border
          description: 描边设置
          nullable: true
          additionalProperties: true
          type: object
        background:
          title: Background
          description: 背景设置
          nullable: true
          additionalProperties: true
          type: object
        shadow:
          title: Shadow
          description: 阴影设置
          nullable: true
          additionalProperties: true
          type: object
        clip_settings:
          title: Clip Settings
          description: 图像调节
          nullable: true
          additionalProperties: true
          type: object
        track_name:
          title: Track Name
          description: 目标轨道名称
          nullable: true
          type: string
        has_shadow:
          type: boolean
          title: Has Shadow
          description: 启用阴影
          default: false
      type: object
      required:
      - captions
      title: CaptionsAdd
    DraftCreate:
      properties:
        width:
          type: integer
          title: Width
          description: 视频宽度（像素）
          default: 1920
        height:
          type: integer
          title: Height
          description: 视频高度（像素）
          default: 1080
        fps:
          type: integer
          title: Fps
          description: 帧率
          default: 30
        name:
          type: string
          title: Name
          description: 草稿名称（可选，不填则自动生成）
          default: ''
      type: object
      title: DraftCreate
    DraftCreateResponse:
      properties:
