openapi: 3.0.3
info:
  title: JianYing Draft API
  description: 剪映草稿自动化 — 独立部署 REST API
  version: 0.2.0
servers:
- url: http://localhost:8000
  description: 剪映草稿 API 服务器
paths:
  /health:
    get:
      tags:
      - 系统
      summary: 健康检查
      description: 检查服务运行状态
      operationId: health
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /drafts:
    get:
      tags:
      - 草稿管理
      summary: 列出所有草稿
      description: 列出当前活跃的所有草稿
      operationId: list_drafts
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftsListResponse'
    post:
      tags:
      - 草稿管理
      summary: 创建草稿
      description: 创建新草稿，返回 draft_id 供后续所有操作使用
      operationId: create_draft
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}:
    get:
      tags:
      - 草稿管理
      summary: 获取草稿信息
      description: 查看指定草稿的基本信息（尺寸、时长等）
      operationId: get_draft
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          title: Draft Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftInfoResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - 草稿管理
      summary: 删除草稿
      description: 删除指定草稿及其文件
      operationId: delete_draft
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          title: Draft Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/save:
    post:
      tags:
      - 草稿管理
      summary: 保存草稿
      description: 将草稿写入磁盘
      operationId: save_draft
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          title: Draft Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftSaveResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/export:
    post:
      tags:
      - 草稿管理
      summary: 导出草稿 JSON
      description: 导出草稿为 JSON 字符串
      operationId: export_draft
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          title: Draft Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftExportResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/tracks:
    post:
      tags:
      - 轨道
      summary: 添加轨道
      description: 向草稿添加一条轨道
      operationId: add_track
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          title: Draft Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackAdd'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackAddResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - 轨道
      summary: 列出轨道
      description: 列出草稿中所有轨道
      operationId: list_tracks
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          title: Draft Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/videos:
    post:
      tags:
      - 视频
      summary: 添加视频
      description: 添加单个视频或图片片段
      operationId: add_video
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          title: Draft Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoAdd'
      responses:
        '200':
          description: Successful Response
