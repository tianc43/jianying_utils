        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/videos/batch:
    post:
      tags:
      - 视频
      summary: 批量添加视频
      description: 批量添加视频或图片片段
